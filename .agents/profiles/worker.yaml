name: "worker"
kind: "role"
selection: "exclusive"
role_scope: "single-slice"
description: "Implements one bounded dev-flow slice inside an active workspace."
when: "Use as the active role when a bounded slice is ready for code changes."
inherits:
  - "base"
requires_runtime_profile: true
runtime_overlay_group: "runtime"
skills:
  - "dev-flow-workspace"
  - "dev-flow-change-loop"
  - "dev-flow-validation"
