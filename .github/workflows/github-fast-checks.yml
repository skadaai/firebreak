name: Firebreak GitHub Fast Checks
# Run only cheap GitHub-hosted checks before any Namespace runtime jobs.
# Policy source: guides/ci-multi-arch-testing.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-hosted-smoke-matrix:
    name: Prepare Hosted Smoke Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.render.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render hosted smoke matrix
        id: render
        run: echo "matrix=$(sh .github/scripts/render-ci-matrix.sh github-fast x86_64-linux)" >> "$GITHUB_OUTPUT"

  nix-checks:
    name: Nix Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run flake checks
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' flake check --print-build-logs

  hosted-smoke-tests:
    name: amd64 / ${{ matrix.package }}
    needs: prepare-hosted-smoke-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-hosted-smoke-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node for launcher smoke
        if: matrix.package == 'firebreak-test-smoke-npx-launcher'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run hosted smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload hosted smoke artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: github-fast-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0
