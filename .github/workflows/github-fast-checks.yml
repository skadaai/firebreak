name: Firebreak GitHub Fast Checks
# Run only cheap GitHub-hosted checks before any Namespace runtime jobs.
# Policy source: guides/ci-multi-arch-testing.md

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly full CI chain kickoff on main. This fans out into the Namespace
    # primary and secondary runtime workflows via workflow_run.
    - cron: '0 5 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-checks:
    name: Nix Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run flake checks
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' flake check --print-build-logs

  hosted-smoke-tests:
    name: amd64 / ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        package:
          - firebreak-test-smoke-project-config-and-doctor
          - firebreak-test-smoke-npx-launcher
          - firebreak-test-smoke-firebreak-cli-surface
          - firebreak-test-smoke-worker-proxy-script
          - firebreak-test-smoke-local-controller
          - firebreak-test-smoke-cloud-hypervisor-egress-proxy
          - firebreak-test-smoke-cloud-hypervisor-port-publish
          - firebreak-test-smoke-worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run hosted smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload hosted smoke artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: github-fast-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0
