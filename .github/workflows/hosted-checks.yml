name: Firebreak Hosted Checks
# Run hosted Firebreak checks without KVM.
# Policy source: guides/ci-multi-arch-testing.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-checks:
    name: Nix Checks
    runs-on: nscloud-ubuntu-24.04-amd64-2x4
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run flake checks
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' flake check --print-build-logs

  hosted-smoke-tests:
    name: amd64 / ${{ matrix.package }} (1x2)
    runs-on: nscloud-ubuntu-24.04-amd64-1x2
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        package:
          - firebreak-test-smoke-project-config-and-doctor
          - firebreak-test-smoke-npx-launcher
          - firebreak-test-smoke-firebreak-cli-surface
          - firebreak-test-smoke-worker-proxy-script
          - firebreak-test-smoke-local-controller
          - firebreak-test-smoke-cloud-hypervisor-egress-proxy
          - firebreak-test-smoke-cloud-hypervisor-port-publish
          - firebreak-test-smoke-worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run hosted smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload hosted smoke artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: hosted-smoke-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0

  # Keep secondary architectures representative rather than cloning the full amd64 matrix.
  arm64-linux-representative-smoke-tests:
    name: arm64-linux representative runtime smokes (1x2)
    runs-on: nscloud-ubuntu-24.04-arm64-1x2
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run representative arm64-linux runtime coverage
        run: |
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-codex-version
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-npx-launcher

      - name: Upload arm64-linux artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: arm64-linux-hosted-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0

  arm64-darwin-representative-checks:
    name: arm64-darwin representative vfkit checks (6x14)
    runs-on: nscloud-macos-sequoia-arm64-6x14
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run representative arm64-darwin vfkit coverage
        run: |
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-codex.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-claude-code.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#checks.aarch64-darwin.firebreak-codex-system.drvPath --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-codex-version
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-npx-launcher
