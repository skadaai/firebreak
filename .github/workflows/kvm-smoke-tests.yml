name: Firebreak KVM Smoke Tests
description: Run KVM-backed Firebreak smoke tests after hosted checks pass.

on:
  workflow_run:
    workflows: ["Firebreak Hosted Checks"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (e.g. 42) — leave empty to use current branch"
        required: false

permissions:
  contents: read

concurrency:
  group: vm-smoke-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  vm-smoke-tests:
    name: ${{ matrix.package }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: namespace-profile-amd64
    # runs-on:
    #   - self-hosted
    #   - linux
    #   - kvm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package:
          - firebreak-test-smoke-codex
          - firebreak-test-smoke-codex-version
          - firebreak-test-smoke-codex-warm-reuse
          - firebreak-test-smoke-claude-code
          - firebreak-test-smoke-credential-slots
          - firebreak-test-smoke-codex-credential-slots
          - firebreak-test-smoke-claude-code-credential-slots
          - firebreak-test-smoke-port-publish-runtime
          - firebreak-test-smoke-internal-validate
          - firebreak-test-smoke-internal-task
          - firebreak-test-smoke-internal-loop
          - firebreak-test-smoke-worker-firebreak-attach
          - firebreak-test-smoke-worker-claude-version
          - firebreak-test-smoke-worker-interactive-claude-direct
          - firebreak-test-smoke-worker-interactive-claude-exit-direct
          - firebreak-test-smoke-worker-interactive-codex-direct
          - firebreak-test-smoke-worker-guest-bridge
          - firebreak-test-smoke-worker-guest-bridge-interactive
          # Parked while the dormant cloud/QEMU profile is out of the active CI surface.
          # - firebreak-test-smoke-cloud-job

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Run KVM smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload KVM smoke artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: kvm-smoke-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /cache/firebreak/
            /tmp/firebreak/
          if-no-files-found: ignore
          compression-level: 0
