name: Firebreak Namespace Full Arch Sweep
# Run the broadest practical smoke surface across every supported host arch.
# This is intentionally scheduled outside the pull-request gate.
# Policy source: guides/ci-multi-arch-testing.md

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: namespace-full-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-full-sweep-matrices:
    name: Prepare Full Sweep Matrices
    runs-on: ubuntu-latest
    outputs:
      amd64_linux_matrix: ${{ steps.render.outputs.amd64_linux_matrix }}
      arm64_linux_matrix: ${{ steps.render.outputs.arm64_linux_matrix }}
      arm64_darwin_matrix: ${{ steps.render.outputs.arm64_darwin_matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render full sweep matrices
        id: render
        run: |
          echo "amd64_linux_matrix=$(sh .github/scripts/render-ci-matrix.sh namespace-full x86_64-linux)" >> "$GITHUB_OUTPUT"
          echo "arm64_linux_matrix=$(sh .github/scripts/render-ci-matrix.sh namespace-full aarch64-linux)" >> "$GITHUB_OUTPUT"
          echo "arm64_darwin_matrix=$(sh .github/scripts/render-ci-matrix.sh namespace-full aarch64-darwin)" >> "$GITHUB_OUTPUT"

  arm64-linux-kvm-probe:
    name: Probe arm64-linux KVM availability
    needs: prepare-full-sweep-matrices
    runs-on:
      - nscloud-ubuntu-24.04-arm64-2x4-with-features
      - namespace-features:container.privileged=true;container.host-pid-namespace=true
    outputs:
      kvm_available: ${{ steps.probe.outputs.kvm_available }}
      kvm_state: ${{ steps.probe.outputs.kvm_state }}
    steps:
      - name: Probe /dev/kvm
        id: probe
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          if ! [ -e /dev/kvm ]; then
            echo "kvm_state=missing" >> "$GITHUB_OUTPUT"
            echo "kvm_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -l /dev/kvm
          if ! [ -r /dev/kvm ]; then
            echo "kvm_state=not-readable" >> "$GITHUB_OUTPUT"
            echo "kvm_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [ -w /dev/kvm ]; then
            echo "kvm_state=not-writable" >> "$GITHUB_OUTPUT"
            echo "kvm_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! python3 - <<'PY'
          import ctypes
          import os

          KVM_GET_API_VERSION = 0xAE00
          KVM_CREATE_VM = 0xAE01

          libc = ctypes.CDLL(None, use_errno=True)
          kvm_fd = os.open("/dev/kvm", os.O_RDWR | os.O_CLOEXEC)
          try:
              api_version = libc.ioctl(kvm_fd, KVM_GET_API_VERSION, 0)
              if api_version < 0:
                  errno = ctypes.get_errno()
                  raise OSError(errno, os.strerror(errno))
              vm_fd = libc.ioctl(kvm_fd, KVM_CREATE_VM, 0)
              if vm_fd < 0:
                  errno = ctypes.get_errno()
                  raise OSError(errno, os.strerror(errno))
              os.close(vm_fd)
          finally:
              os.close(kvm_fd)

          print("KVM probe passed")
          PY
          then
            echo "kvm_state=create-vm-failed" >> "$GITHUB_OUTPUT"
            echo "kvm_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "kvm_state=ok" >> "$GITHUB_OUTPUT"
          echo "kvm_available=true" >> "$GITHUB_OUTPUT"

  amd64-linux-full:
    name: amd64-linux / ${{ matrix.package }} (${{ matrix.shape }})
    needs: prepare-full-sweep-matrices
    runs-on:
      - ${{ matrix.shape != '' && format('nscloud-ubuntu-24.04-amd64-{0}-with-cache', matrix.shape) || 'nscloud-ubuntu-24.04-amd64-with-cache' }}
      - nscloud-cache-tag-firebreak-runtime-amd64-linux
      - nscloud-runner-tool-cache-20gb
      - nscloud-cache-allow-commit-from-main
      - nscloud-cache-allow-commit-from-default
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-full-sweep-matrices.outputs.amd64_linux_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Set up Node for launcher smoke
        if: matrix.package == 'firebreak-test-smoke-npx-launcher'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run amd64-linux full smoke sweep
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload amd64-linux sweep artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: namespace-full-amd64-linux-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /cache/firebreak/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/cache/firebreak/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0

  arm64-linux-full:
    name: arm64-linux / ${{ matrix.package }} (${{ matrix.shape }})
    needs:
      - prepare-full-sweep-matrices
      - arm64-linux-kvm-probe
    if: needs.arm64-linux-kvm-probe.outputs.kvm_available == 'true'
    runs-on:
      - ${{ matrix.shape != '' && format('nscloud-ubuntu-24.04-arm64-{0}-with-features', matrix.shape) || 'nscloud-ubuntu-24.04-arm64-with-features' }}
      - nscloud-cache-tag-firebreak-runtime-arm64-linux
      - nscloud-runner-tool-cache-20gb
      - nscloud-cache-allow-commit-from-main
      - nscloud-cache-allow-commit-from-default
      - namespace-features:container.privileged=true;container.host-pid-namespace=true
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-full-sweep-matrices.outputs.arm64_linux_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Verify runner KVM on assigned arm64-linux host
        shell: bash
        run: |
          set -euo pipefail
          if ! [ -e /dev/kvm ]; then
            echo "arm64-linux Namespace runner is missing /dev/kvm on the assigned runtime host."
            exit 1
          fi
          if ! [ -r /dev/kvm ]; then
            echo "arm64-linux Namespace runner cannot read /dev/kvm on the assigned runtime host."
            exit 1
          fi
          if ! [ -w /dev/kvm ]; then
            echo "arm64-linux Namespace runner cannot write /dev/kvm on the assigned runtime host."
            exit 1
          fi
          ls -l /dev/kvm
          python3 - <<'PY'
          import ctypes
          import os

          KVM_GET_API_VERSION = 0xAE00
          KVM_CREATE_VM = 0xAE01

          libc = ctypes.CDLL(None, use_errno=True)
          kvm_fd = os.open("/dev/kvm", os.O_RDWR | os.O_CLOEXEC)
          try:
              api_version = libc.ioctl(kvm_fd, KVM_GET_API_VERSION, 0)
              if api_version < 0:
                  errno = ctypes.get_errno()
                  raise OSError(errno, os.strerror(errno))
              vm_fd = libc.ioctl(kvm_fd, KVM_CREATE_VM, 0)
              if vm_fd < 0:
                  errno = ctypes.get_errno()
                  raise OSError(errno, os.strerror(errno))
              os.close(vm_fd)
          finally:
              os.close(kvm_fd)

          print("KVM_CREATE_VM succeeded")
          PY

      - name: Set up Node for launcher smoke
        if: matrix.package == 'firebreak-test-smoke-npx-launcher'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run arm64-linux full smoke sweep
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload arm64-linux sweep artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: namespace-full-arm64-linux-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /cache/firebreak/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/cache/firebreak/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0

  arm64-linux-full-kvm-regression:
    name: arm64-linux full sweep runner regression
    needs: arm64-linux-kvm-probe
    if: needs.arm64-linux-kvm-probe.outputs.kvm_available != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Fail on missing runner KVM
        run: |
          echo "arm64-linux Namespace runner is missing /dev/kvm."
          echo "Detected state: ${{ needs.arm64-linux-kvm-probe.outputs.kvm_state }}"
          echo "This is a runner capability regression or misconfiguration, not a Firebreak arm64 Cloud Hypervisor limitation."
          exit 1

  arm64-darwin-full:
    name: arm64-darwin / ${{ matrix.package }} (${{ matrix.shape }})
    needs: prepare-full-sweep-matrices
    runs-on:
      - ${{ matrix.shape != '' && format('nscloud-macos-sequoia-arm64-{0}-with-cache', matrix.shape) || 'nscloud-macos-sequoia-arm64-with-cache' }}
      - nscloud-cache-tag-firebreak-runtime-arm64-darwin
      - nscloud-runner-tool-cache-20gb
      - nscloud-cache-allow-commit-from-main
      - nscloud-cache-allow-commit-from-default
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-full-sweep-matrices.outputs.arm64_darwin_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Apple Silicon package exports
        run: |
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-codex.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-claude-code.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#checks.aarch64-darwin.firebreak-codex-system.drvPath --raw

      - name: Set up Node for launcher smoke
        if: matrix.package == 'firebreak-test-smoke-npx-launcher'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run arm64-darwin full smoke sweep
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}
