name: Firebreak Namespace Primary Runtime
# Run the full paid x86_64-linux runtime matrix only after GitHub fast checks pass.
# Policy source: guides/ci-multi-arch-testing.md

on:
  workflow_run:
    workflows: ["Firebreak GitHub Fast Checks"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (e.g. 42) — leave empty to use current branch"
        required: false

permissions:
  contents: read

concurrency:
  group: namespace-primary-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  namespace-primary-runtime:
    name: ${{ matrix.package }} (${{ matrix.shape }})
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ format('nscloud-ubuntu-24.04-amd64-{0}', matrix.shape) }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default to the smallest Linux shape and only record proven exceptions.
          - package: firebreak-test-smoke-codex
            shape: 1x2
          - package: firebreak-test-smoke-codex-version
            shape: 1x2
          - package: firebreak-test-smoke-codex-warm-reuse
            shape: 1x2
          - package: firebreak-test-smoke-claude-code
            shape: 1x2
          - package: firebreak-test-smoke-credential-slots
            shape: 1x2
          - package: firebreak-test-smoke-codex-credential-slots
            shape: 1x2
          - package: firebreak-test-smoke-claude-code-credential-slots
            shape: 1x2
          - package: firebreak-test-smoke-port-publish-runtime
            shape: 1x2
          - package: firebreak-test-smoke-internal-validate
            shape: 1x2
          # Proven resource exceptions. Keep these mirrored in guides/ci-multi-arch-testing.md.
          - package: firebreak-test-smoke-internal-task
            shape: 2x4
          - package: firebreak-test-smoke-internal-loop
            shape: 1x2
          - package: firebreak-test-smoke-worker-firebreak-attach
            shape: 1x2
          - package: firebreak-test-smoke-worker-claude-version
            shape: 1x2
          - package: firebreak-test-smoke-worker-interactive-claude-direct
            shape: 1x2
          - package: firebreak-test-smoke-worker-interactive-claude-exit-direct
            shape: 1x2
          - package: firebreak-test-smoke-worker-interactive-codex-direct
            shape: 1x2
          - package: firebreak-test-smoke-worker-guest-bridge
            shape: 1x2
          - package: firebreak-test-smoke-worker-guest-bridge-interactive
            shape: 2x4
          # Parked while the dormant cloud/QEMU profile is out of the active CI surface.
          # - firebreak-test-smoke-cloud-job

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Run primary runtime smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload primary runtime artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: namespace-primary-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /cache/firebreak/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/cache/firebreak/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0
