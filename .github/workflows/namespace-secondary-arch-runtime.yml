name: Firebreak Namespace Secondary Arch Runtime
# Run representative paid runtime checks on secondary architectures only after the primary Namespace runtime gate passes.
# Policy source: guides/ci-multi-arch-testing.md

on:
  workflow_run:
    workflows: ["Firebreak Namespace Primary Runtime"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (e.g. 42) — leave empty to use current branch"
        required: false

permissions:
  contents: read

concurrency:
  group: namespace-secondary-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-secondary-runtime-matrices:
    name: Prepare Secondary Runtime Matrices
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      arm64_linux_matrix: ${{ steps.render.outputs.arm64_linux_matrix }}
      arm64_darwin_matrix: ${{ steps.render.outputs.arm64_darwin_matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Render secondary runtime matrices
        id: render
        run: |
          echo "arm64_linux_matrix=$(sh .github/scripts/render-ci-matrix.sh namespace-secondary aarch64-linux)" >> "$GITHUB_OUTPUT"
          echo "arm64_darwin_matrix=$(sh .github/scripts/render-ci-matrix.sh namespace-secondary aarch64-darwin)" >> "$GITHUB_OUTPUT"

  arm64-linux-runtime:
    name: arm64-linux / ${{ matrix.package }} (${{ matrix.shape }})
    needs: prepare-secondary-runtime-matrices
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ format('nscloud-ubuntu-24.04-arm64-{0}', matrix.shape) }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-secondary-runtime-matrices.outputs.arm64_linux_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run arm64-linux representative runtime coverage
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}

      - name: Upload arm64-linux artifacts on failure
        if: failure()
        uses: namespace-actions/upload-artifact@v1
        with:
          name: namespace-secondary-arm64-linux-${{ matrix.package }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /home/runner/.cache/firebreak/
            /home/runner/.cache/firebreak-test/
            /tmp/firebreak/
            !/home/runner/.cache/firebreak/**/*.socket
            !/home/runner/.cache/firebreak-test/**/*.socket
            !/tmp/firebreak/**/*.socket
          if-no-files-found: ignore
          compression-level: 0

  arm64-darwin-runtime:
    name: arm64-darwin / ${{ matrix.package }} (${{ matrix.shape }})
    needs: prepare-secondary-runtime-matrices
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ format('nscloud-macos-sequoia-arm64-{0}', matrix.shape) }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-secondary-runtime-matrices.outputs.arm64_darwin_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Apple Silicon package exports
        run: |
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-codex.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#packages.aarch64-darwin.firebreak-claude-code.name --raw
          nix --accept-flake-config --extra-experimental-features 'nix-command flakes' eval .#checks.aarch64-darwin.firebreak-codex-system.drvPath --raw

      - name: Run arm64-darwin representative vfkit coverage
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#${{ matrix.package }}
