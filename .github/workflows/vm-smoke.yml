name: Firebreak Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vm-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firebreak-test-smoke-codex:
    name: firebreak test-smoke codex
    runs-on: namespace-profile-amd64
    # if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SELF_HOSTED_VM_SMOKE == '1'
    # runs-on:
    #   - self-hosted
    #   - linux
    #   - kvm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Run Firebreak Codex smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-codex
