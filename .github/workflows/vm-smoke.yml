name: Firebreak Smoke
description: Run smoke tests for Firebreak repository - requires KVM, longer feedback loop for PRs.

on:
  workflow_run:
    workflows: ["Firebreak Checks"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (e.g. 42) — leave empty to use current branch"
        required: false

permissions:
  contents: read

concurrency:
  group: vm-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firebreak-test-smoke-codex:
    name: firebreak test-smoke codex
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: namespace-profile-amd64
    # runs-on:
    #   - self-hosted
    #   - linux
    #   - kvm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Checkout PR head if pr_number provided
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          enable_kvm: true
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Run Firebreak Codex smoke test
        run: nix --accept-flake-config --extra-experimental-features 'nix-command flakes' run .#firebreak-test-smoke-codex
